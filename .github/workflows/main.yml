name: tests
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'
      - name: Install dependencies
        run:
          go mod tidy
      - name: Build
        run: go build -v ./...
      - name: Test with the Go CLI
        run: make test
